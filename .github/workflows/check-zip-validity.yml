name: Check ZIP Validity

on:
  push:
    branches: [main]
    paths:
      - 'documents/**/*.odt'
      - 'documents/**/*.docx'
      - 'documents/**/*.epub'
      - 'bin/check-zip-validity.py'
      - '.github/workflows/check-zip-validity.yml'
  pull_request:
    branches: [main]
    paths:
      - 'documents/**/*.odt'
      - 'documents/**/*.docx'
      - 'documents/**/*.epub'
      - 'bin/check-zip-validity.py'
      - '.github/workflows/check-zip-validity.yml'

jobs:
  check-zip:
    name: Validate ZIP Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Check ZIP validity
        run: python3 bin/check-zip-validity.py
